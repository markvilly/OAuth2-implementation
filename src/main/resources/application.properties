spring.application.name=OAuth2

#Postgresql Datasource
spring.datasource.url=jdbc:postgresql://localhost:5433/MyUsers
spring.datasource.username=authuser
spring.datasource.password=0000
spring.datasource.drive-class-name=org.postgresql.Driver

#JPA - disable DDL auto Hibernate will check that the schema matches your entities but won't touch it.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

#Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration



#App port 
server.port=8080